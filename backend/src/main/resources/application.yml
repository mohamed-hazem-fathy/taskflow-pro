spring:
  profiles:
    active: dev
  application:
    name: taskflow-pro
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${DB_USERNAME:taskflow}
    password: ${DB_PASSWORD:taskflow}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/migration/changelog-master.xml

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-long}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  seed:
    enabled: true
    admin-email: mh5725012@gmail.com
    admin-username: admin
    admin-full-name: System Administrator
    admin-password: ${ADMIN_PASSWORD:}
    demo-data-enabled: true

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
